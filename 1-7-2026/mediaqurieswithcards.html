<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Cards</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f2f2f2;
            padding:20px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        .container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
        }

        .card{
            width:30%;
            background:white;
            border:2px solid black;
            border-radius:10px;
            padding:20px;
            text-align:center;
            box-shadow:0 0 10px gray;
        }

        .card h2{
            margin-bottom:15px;
        }

        .card p{
            margin-bottom:20px;
        }

        .card button{
            background:blue;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        .card button:hover{
            background:darkblue;
        }

        /* Tablet */

        @media screen and (max-width:768px){

            body{
                background:lightyellow;
            }

            .card{
                width:45%;
            }

        }

        /* Mobile */

        @media screen and (max-width:480px){

            body{
                background:gray;
            }

            h1{
                font-size:24px;
            }

            .card{
                width:90%;
            }

        }

    </style>

</head>
<body>

<h1>Responsive Card Layout</h1>

<div class="container">

    <div class="card">
        <h2>Card 1</h2>
        <p>This is the first card.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <h2>Card 2</h2>
        <p>This is the second card.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <h2>Card 3</h2>
        <p>This is the third card.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <h2>Card 4</h2>
        <p>This is the fourth card.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <h2>Card 5</h2>
        <p>This is the fifth card.</p>
        <button>Read More</button>
    </div>

    <div class="card">
        <h2>Card 6</h2>
        <p>This is the sixth card.</p>
        <button>Read More</button>
    </div>

</div>

</body>
</html>
