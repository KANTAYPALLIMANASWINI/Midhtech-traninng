<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Login Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background-color:lightblue;
    font-family:Arial,sans-serif;
}

.container{
    width:400px;
    background:white;
    padding:30px;
    border:3px solid black;
    border-radius:10px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:350px;
    padding:10px;
    margin-bottom:15px;
    border:2px solid gray;
    border-radius:5px;
    font-size:16px;
}

button{
    width:350px;
    padding:10px;
    background:blue;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:darkblue;
}

/* Mobile View */

@media screen and (max-width:768px){

    body{
        background-color:gray;
    }

    .container{
        width:90%;
        padding:40px;
        border:4px dashed red;
    }

    h1{
        font-size:24px;
    }

    input{
        width:100%;
    }

    button{
        width:100%;
    }

}

</style>

</head>
<body>

<div class="container">

    <h1>Login Form</h1>

    <form>

        <input type="text" placeholder="Enter Username">

        <input type="password" placeholder="Enter Password">

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
